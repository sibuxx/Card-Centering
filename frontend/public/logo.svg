<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="artBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="backShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="102" ry="102" fill="url(#bg)"/>

  <!-- Subtle radial burst behind cards -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.1"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.08"/>

  <!-- Crosshair guides -->
  <line x1="256" y1="60" x2="256" y2="140" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="256" y1="372" x2="256" y2="452" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="60" y1="256" x2="140" y2="256" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>
  <line x1="372" y1="256" x2="452" y2="256" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.4"/>

  <!-- Corner brackets -->
  <polyline points="105,155 105,110 150,110" fill="none" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="362,110 407,110 407,155" fill="none" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="105,357 105,402 150,402" fill="none" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <polyline points="407,357 407,402 362,402" fill="none" stroke="#c4b5fd" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- === BACK CARD (tilted right) === -->
  <g transform="rotate(12, 290, 260)" filter="url(#backShadow)">
    <rect x="208" y="128" width="136" height="190" rx="10" ry="10" fill="url(#cardBack)" stroke="#4c1d95" stroke-width="2"/>
    <!-- Back design pattern -->
    <rect x="218" y="138" width="116" height="170" rx="6" ry="6" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
    <circle cx="276" cy="223" r="38" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.4"/>
    <circle cx="276" cy="223" r="22" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.3"/>
    <circle cx="276" cy="223" r="8" fill="#c4b5fd" opacity="0.35"/>
    <!-- Pokeball-like line -->
    <line x1="218" y1="223" x2="254" y2="223" stroke="#c4b5fd" stroke-width="1.5" opacity="0.3"/>
    <line x1="298" y1="223" x2="334" y2="223" stroke="#c4b5fd" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- === BACK CARD (tilted left) === -->
  <g transform="rotate(-10, 222, 260)" filter="url(#backShadow)">
    <rect x="168" y="128" width="136" height="190" rx="10" ry="10" fill="url(#cardBack)" stroke="#4c1d95" stroke-width="2"/>
    <rect x="178" y="138" width="116" height="170" rx="6" ry="6" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.5"/>
    <circle cx="236" cy="223" r="38" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.4"/>
    <circle cx="236" cy="223" r="22" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.3"/>
    <circle cx="236" cy="223" r="8" fill="#c4b5fd" opacity="0.35"/>
    <line x1="178" y1="223" x2="214" y2="223" stroke="#c4b5fd" stroke-width="1.5" opacity="0.3"/>
    <line x1="258" y1="223" x2="294" y2="223" stroke="#c4b5fd" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- === MAIN CARD (centered, face up) === -->
  <g filter="url(#cardShadow)">
    <!-- Card body -->
    <rect x="186" y="120" width="140" height="196" rx="10" ry="10" fill="url(#cardFace)" stroke="url(#goldRim)" stroke-width="2.5"/>

    <!-- Card name bar -->
    <rect x="198" y="130" width="86" height="12" rx="3" fill="#92400e" opacity="0.6"/>
    <rect x="298" y="131" width="18" height="10" rx="5" fill="#ef4444" opacity="0.7"/>

    <!-- Art box (portrait area) -->
    <rect x="198" y="150" width="118" height="80" rx="4" ry="4" fill="url(#artBox)" stroke="#d97706" stroke-width="1.5"/>

    <!-- Simple creature silhouette in art box -->
    <ellipse cx="257" cy="210" rx="22" ry="14" fill="#3b82f6" opacity="0.3"/>
    <!-- Star/spark shape as creature -->
    <polygon points="257,170 262,185 278,185 265,194 270,210 257,200 244,210 249,194 236,185 252,185" fill="#2563eb" opacity="0.55"/>
    <!-- Small sparkles -->
    <circle cx="240" cy="175" r="2" fill="#fbbf24" opacity="0.7"/>
    <circle cx="275" cy="178" r="1.5" fill="#fbbf24" opacity="0.6"/>
    <circle cx="248" cy="205" r="1.5" fill="#fbbf24" opacity="0.5"/>

    <!-- Info bar below art -->
    <rect x="198" y="238" width="118" height="10" rx="2" fill="#92400e" opacity="0.15"/>
    <rect x="202" y="240" width="50" height="6" rx="2" fill="#92400e" opacity="0.3"/>

    <!-- Description box -->
    <rect x="198" y="254" width="118" height="40" rx="4" ry="4" fill="#fefce8" stroke="#d97706" stroke-width="0.8" opacity="0.7"/>
    <rect x="206" y="262" width="100" height="4" rx="2" fill="#92400e" opacity="0.2"/>
    <rect x="206" y="271" width="85" height="4" rx="2" fill="#92400e" opacity="0.15"/>
    <rect x="206" y="280" width="92" height="4" rx="2" fill="#92400e" opacity="0.12"/>

    <!-- Bottom stats bar -->
    <rect x="198" y="300" width="30" height="7" rx="2" fill="#92400e" opacity="0.2"/>
    <rect x="286" y="300" width="30" height="7" rx="2" fill="#92400e" opacity="0.2"/>

    <!-- HP badge top right -->
    <text x="297" y="141" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#dc2626" opacity="0.8">HP</text>
  </g>

  <!-- Golden center target dot -->
  <circle cx="256" cy="256" r="8" fill="#fbbf24" opacity="0.9" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <circle cx="256" cy="256" r="20" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.25"/>

  <!-- Small sparkle accents -->
  <circle cx="148" cy="180" r="2.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="370" cy="340" r="2" fill="#fbbf24" opacity="0.5"/>
  <circle cx="360" cy="160" r="3" fill="#a78bfa" opacity="0.4"/>
  <circle cx="150" cy="350" r="2.5" fill="#a78bfa" opacity="0.35"/>
</svg>